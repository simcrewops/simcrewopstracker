name: Build SimCrewOps Tracker

on:
  push:
    tags:
      - 'tracker-v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm install
        env:
          npm_config_arch: x64

      - name: Write build config
        shell: bash
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          echo "'use strict'; module.exports = { mapboxToken: '${MAPBOX_TOKEN}' };" > src/config.js

      - name: Build Windows installer
        run: npm run build:win -- --publish never
        env:
          npm_config_arch: x64

      - name: Upload .exe to simcrewopstracker release
        shell: python
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          import os, glob, json, urllib.request, urllib.parse

          token = os.environ['GH_TOKEN']
          # Strip "tracker-" prefix: tracker-v1.0.29 -> v1.0.29
          tag = os.environ['TAG_NAME'].replace('tracker-', '', 1)
          repo = 'simcrewops/simcrewopstracker'

          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github.v3+json',
              'User-Agent': 'github-actions',
          }

          # Get or create the release for this tag
          url = f'https://api.github.com/repos/{repo}/releases/tags/{tag}'
          req = urllib.request.Request(url, headers=headers)
          try:
              with urllib.request.urlopen(req) as resp:
                  release = json.loads(resp.read())
              print(f'Found release id={release["id"]} for tag {tag}')
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  payload = json.dumps({'tag_name': tag, 'name': tag, 'body': ''}).encode()
                  create_req = urllib.request.Request(
                      f'https://api.github.com/repos/{repo}/releases',
                      data=payload,
                      headers={**headers, 'Content-Type': 'application/json'},
                      method='POST'
                  )
                  with urllib.request.urlopen(create_req) as resp:
                      release = json.loads(resp.read())
                  print(f'Created release id={release["id"]} for tag {tag}')
              else:
                  raise

          release_id = release['id']

          # Delete any existing assets so we replace them cleanly
          for asset in release.get('assets', []):
              del_req = urllib.request.Request(
                  f'https://api.github.com/repos/{repo}/releases/assets/{asset["id"]}',
                  headers=headers,
                  method='DELETE'
              )
              urllib.request.urlopen(del_req)
              print(f'Deleted old asset: {asset["name"]}')

          # Find the built exe
          exe_files = glob.glob('dist/*.exe')
          if not exe_files:
              raise FileNotFoundError('No .exe found in dist/ - check build output')
          exe_path = exe_files[0]
          exe_name = os.path.basename(exe_path)
          print(f'Uploading {exe_name} ({os.path.getsize(exe_path)} bytes)...')

          with open(exe_path, 'rb') as f:
              data = f.read()

          upload_url = f'https://uploads.github.com/repos/{repo}/releases/{release_id}/assets?name={urllib.parse.quote(exe_name)}'
          upload_req = urllib.request.Request(
              upload_url,
              data=data,
              headers={**headers, 'Content-Type': 'application/json', 'Content-Type': 'application/octet-stream'},
              method='POST'
          )
          with urllib.request.urlopen(upload_req) as resp:
              result = json.loads(resp.read())
          print(f'Success: {result["browser_download_url"]}')
